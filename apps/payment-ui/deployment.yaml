apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-ui
  namespace: dev
  labels:
    app: payment-ui
    team: team-angular
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-ui
  template:
    metadata:
      labels:
        app: payment-ui
        team: team-angular
    spec:
      containers:
        - name: payment-ui
          image: sky2108/payment-ui:5ca17d74d71a12a6d8306f6d7e17d2f36d3c9b7e
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
