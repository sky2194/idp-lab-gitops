apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: new-service
  title: Create a New Service
  description: Creates a GitHub repo, CI pipeline, and ArgoCD deployment automatically
  tags:
    - recommended
    - python
    - nodejs
spec:
  owner: team-platform
  type: service

  parameters:
    - title: Service Details
      required:
        - serviceName
        - description
        - team
      properties:
        serviceName:
          title: Service Name
          type: string
          description: Name of the service (lowercase, hyphens only)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What does this service do?
        team:
          title: Team
          type: string
          description: Which team owns this service?
          enum:
            - team-angular
            - team-backend
            - team-platform
            - team-data
          enumNames:
            - Team Angular
            - Team Backend
            - Team Platform
            - Team Data

    - title: Technical Configuration
      required:
        - language
        - starter
        - namespace
      properties:
        language:
          title: Language
          type: string
          description: Primary language for this service
          enum:
            - python
            - nodejs
          enumNames:
            - Python
            - Node.js
          default: python
        starter:
          title: Starter Template
          type: string
          description: Start with sample code or a minimal setup?
          enum:
            - sample
            - minimal
          enumNames:
            - Full Sample App (working code + Dockerfile)
            - Minimal (README + .gitignore only)
          default: sample
        namespace:
          title: Target Namespace
          type: string
          description: Kubernetes namespace to deploy into
          enum:
            - dev
            - dev2
          enumNames:
            - dev (stable)
            - dev2 (feature/experimental)
          default: dev

    - title: GitHub Repository
      required:
        - repoUrl
      properties:
        repoUrl:
          title: Repository Location
          type: string
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com

  steps:
    - id: fetch-template
      name: Fetch Template
      action: fetch:template
      input:
        url: ./skeleton/${{ parameters.language }}
        # copyWithoutTemplating:
        #   - .github/workflows/ci.yaml
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          team: ${{ parameters.team }}
          namespace: ${{ parameters.namespace }}
          language: ${{ parameters.language }}
      if: ${{ parameters.starter === 'sample' }}

    - id: fetch-minimal
      name: Fetch Minimal Template
      action: fetch:template
      input:
        url: ./skeleton/minimal
        values:
          serviceName: ${{ parameters.serviceName }}
          description: ${{ parameters.description }}
          team: ${{ parameters.team }}
          namespace: ${{ parameters.namespace }}
      if: ${{ parameters.starter === 'minimal' }}

    - id: publish
      name: Create GitHub Repo
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: ${{ parameters.repoUrl }}
        defaultBranch: main

    - id: fetch-gitops
      name: Prepare GitOps Manifests
      action: fetch:template
      input:
        url: ./gitops-skeleton
        targetPath: ./gitops-output
        values:
          serviceName: ${{ parameters.serviceName }}
          namespace: ${{ parameters.namespace }}
          team: ${{ parameters.team }}
          imageRepo: sky2108/${{ parameters.serviceName }}

    - id: publish-gitops
      name: Push to GitOps Repo
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=idp-lab-gitops&owner=idp-lab-org
        branchName: add-${{ parameters.serviceName }}
        title: "Add ${{ parameters.serviceName }} service"
        description: "Auto-generated by Backstage for ${{ parameters.serviceName }}"
        sourcePath: ./gitops-output

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: GitHub Repo
        url: ${{ steps.publish.output.remoteUrl }}
      - title: GitOps PR
        url: ${{ steps.publish-gitops.output.remoteUrl }}
      - title: Open in Catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
