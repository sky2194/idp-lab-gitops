apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${{ values.serviceName }}
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/idp-lab-org/idp-lab-gitops
    targetRevision: main
    path: apps/${{ values.serviceName }}
  destination:
    server: https://kubernetes.default.svc
    namespace: ${{ values.namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
