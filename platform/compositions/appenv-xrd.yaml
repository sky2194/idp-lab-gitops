apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xenvironments.platform.example.com
spec:
  group: platform.example.com
  names:
    kind: XEnvironment
    plural: xenvironments
  claimNames:
    kind: AppEnvironment
    plural: appenvironments
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              team:
                type: string
                description: "Team name owning this environment"
              size:
                type: string
                description: "Size of the environment: small, medium, large"
                enum: ["small", "medium", "large"]
            required:
              - team
              - size
